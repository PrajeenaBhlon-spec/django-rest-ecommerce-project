<!DOCTYPE html>
<html>
<head>
    <title>Chat with our skincare expert</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        max-width: 600px;
        margin: 40px auto;
        padding: 20px;
      }
      .chat-container {
        border: 1px solid #ddd;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        height: 600px;
        background: white;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      }
      .messages-area {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .message {
        display: flex;
        margin-bottom: 8px;
      }
      .message.user {
        justify-content: flex-end;
      }
      .message-bubble {
        max-width: 70%;
        padding: 12px 16px;
        border-radius: 12px;
        word-wrap: break-word;
        font-size: 14px;
      }
      .message.user .message-bubble {
        background: rgb(211, 116, 138);
        color: white;
      }
      .message.bot .message-bubble {
        background: #f0f0f0;
        color: #333;
      }
      .input-area {
        border-top: 1px solid #ddd;
        padding: 16px;
        display: flex;
        gap: 8px;
        background: #fafafa;
      }
      input {
        flex: 1;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
      }
      h1{
        color : rgb(211, 116, 138);
      }
      button {
        padding: 12px 24px;
        background: rgb(211, 116, 138);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
      }
      button:hover {
        background: rgb(222, 102, 130);
      }
    </style>
</head>
<body>
  <h1>Chat with our expert</h1>
    
  <div class="chat-container">
    <div class="messages-area" id="messagesArea">
      <div class="message bot">
        <div class="message-bubble">Hi! 👋 Welcome to our website. I'm here to help you find the perfect products for your needs.</div>
      </div>
    </div>
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Ask me about skincare , bodycare, or cosmetics..." />
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(text, isUser) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
      
      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.textContent = text;
      
      messageDiv.appendChild(bubble);
      messagesArea.appendChild(messageDiv);
      
      messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;
      addMessage(text, true);
      messageInput.value = '';
      sendBtn.disabled = true;
      
      try {
        const response = await fetch('{% url "chatbot_view" %}', {
          method: 'POST',
          headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': '{{ csrf_token }}'
          },
          body: JSON.stringify({ message: text })
        });
            
        const data = await response.json();
        
        if (data.success) {
          addMessage(data.response, false);
        } else {
          addMessage('Sorry, something went wrong. Please try again.', false);
        }
      } 
      catch (error) {
        addMessage('Connection error. Please check your connection.', false);
      } 
      finally {
        sendBtn.disabled = false;
        messageInput.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendMessage();
    }
    });
    messageInput.focus();
  </script>
</body>
</html>
